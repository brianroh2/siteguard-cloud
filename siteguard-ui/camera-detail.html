<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카메라 상세</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1117; color: #ccc; font-size: 12px; }

/* 전체 레이아웃: 좌(라이브뷰) + 우(5섹션 패널) */
#layout { display: flex; height: 100vh; }
#col-live { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
#col-info { width: 380px; min-width: 300px; background: #0f1117; border-left: 1px solid #2a2a4a;
            display: flex; flex-direction: column; overflow: hidden; }

/* TB 사이드패널 내 좁은 화면: 세로 스택 */
@media (max-width: 680px) {
  #layout { flex-direction: column; }
  #col-live { flex: none; height: 35vh; min-height: 180px; }
  #col-info { width: 100%; border-left: none; border-top: 1px solid #2a2a4a; flex: 1; }
  #live-header { padding: 6px 10px; }
}

/* 좌측 — 영상 */
#live-header { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
               background: #161b2e; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
#live-title { color: #4db6ac; font-size: 13px; font-weight: 600; flex: 1; }
#live-status { font-size: 11px; }
#btn-back { background: none; border: 1px solid #2a3a4a; color: #888; padding: 4px 12px;
            border-radius: 4px; cursor: pointer; font-size: 11px; }
#btn-back:hover { color: #4db6ac; border-color: #4db6ac; }
#live-frame { flex: 1; border: none; display: block; background: #000; }
#live-msg { display: none; flex: 1; align-items: center; justify-content: center;
            color: #888; font-size: 13px; flex-direction: column; gap: 8px; }

/* 우측 — 정보 패널 */
#info-header { padding: 10px 14px; background: #161b2e; border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
#info-name { color: #4db6ac; font-size: 14px; font-weight: 600; }
#info-sub  { color: #888; font-size: 11px; margin-top: 2px; }
#info-scroll { flex: 1; overflow-y: auto; padding: 0 0 16px; }

/* 섹션 */
.section { border-bottom: 1px solid #1e1e30; }
.sec-head {
  display: flex; align-items: center; padding: 10px 14px 6px;
  color: #4db6ac; font-size: 11px; font-weight: 700; letter-spacing: .4px;
  border-left: 3px solid #4db6ac; margin-left: -1px;
}
.sec-head-text { flex: 1; }
.btn-edit {
  background: none; border: 1px solid #2a3a4a; color: #888;
  padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; margin-left: 8px;
}
.btn-edit:hover { color: #4db6ac; border-color: #4db6ac; }
.btn-save {
  background: #1a4a3a; border: 1px solid #2a6a5a; color: #4db6ac;
  padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; margin-left: 4px;
}
.btn-save:hover { background: #1e5a48; }
.btn-cancel {
  background: none; border: 1px solid #3a2a2a; color: #888;
  padding: 3px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; margin-left: 4px;
}
.btn-cancel:hover { color: #f44336; border-color: #f44336; }

/* 속성 테이블 */
.attr-table { width: 100%; padding: 4px 14px 8px; }
.attr-row { display: flex; align-items: flex-start; padding: 3px 0; }
.attr-key { color: #888; width: 42%; flex-shrink: 0; padding-right: 8px; line-height: 1.5; }
.attr-val { color: #ddd; flex: 1; line-height: 1.5; word-break: break-all; }
.attr-val.muted { color: #888; font-style: italic; }
.attr-val.url   { color: #aaa; font-size: 10px; word-break: break-all; }
.attr-val.green { color: #4caf50; font-weight: 600; }
.attr-val.grey  { color: #888; }

/* 편집 입력 */
input.edit-field, select.edit-field {
  background: #1a1a2e; color: #ddd; border: 1px solid #3a4a6a;
  padding: 3px 7px; border-radius: 3px; font-size: 11px; width: 100%;
}
input.edit-field:focus, select.edit-field:focus { outline: none; border-color: #4db6ac; }

/* 저장소 프로그레스 바 */
.progress-row { padding: 3px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
.progress-bar { height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: #4db6ac; transition: width .3s; }
.progress-fill.warn { background: #ffb300; }
.progress-fill.full { background: #f44336; }

/* 복사 버튼 */
.copy-row { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; }
.copy-key { color: #888; width: 42%; flex-shrink: 0; }
.copy-val { flex: 1; color: #aaa; font-size: 10px; word-break: break-all; line-height: 1.5; }
.btn-copy {
  background: #1a2a3a; border: 1px solid #2a3a4a; color: #888;
  padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 10px;
  flex-shrink: 0; white-space: nowrap;
}
.btn-copy:hover { color: #4db6ac; border-color: #4db6ac; }
.btn-copy.copied { color: #4caf50; border-color: #4caf50; }

/* 하단 버튼 */
#bottom-btns { padding: 12px 14px; border-top: 1px solid #1e1e30; flex-shrink: 0; }
.btn-onvif {
  background: #1a2a4a; border: 1px solid #2a3a5a; color: #88aacc;
  padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-right: 8px;
}
.btn-onvif:hover { background: #1e3258; }
.btn-del {
  background: #3a1a1a; border: 1px solid #5a2a2a; color: #f44336;
  padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 11px;
}
.btn-del:hover { background: #481e1e; }

/* 팝업 오버레이 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100;
           align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.dialog { background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 8px;
          padding: 24px; min-width: 300px; max-width: 400px; }
.dialog h3 { color: #ffb300; font-size: 14px; margin-bottom: 10px; }
.dialog p  { color: #ccc; font-size: 12px; line-height: 1.6; margin-bottom: 16px; }
.dialog-btns { display: flex; gap: 8px; justify-content: flex-end; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
         background: #1a3a2a; border: 1px solid #2a5a3a; color: #4caf50;
         padding: 8px 20px; border-radius: 20px; font-size: 12px;
         opacity: 0; transition: all .3s; z-index: 200; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 삭제 확인 팝업 -->
<div class="overlay" id="del-overlay">
  <div class="dialog">
    <h3>⚠️ 카메라 삭제</h3>
    <p id="del-msg">카메라를 목록에서 제거하시겠습니까?<br>TB 기기 정보가 삭제됩니다.</p>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeOverlay('del-overlay')">취소</button>
      <button class="btn-del" id="btn-del-confirm">삭제</button>
    </div>
  </div>
</div>

<!-- 에지 저장소 초기화 팝업 -->
<div class="overlay" id="clr-overlay">
  <div class="dialog">
    <h3>⚠️ 에지 저장소 초기화</h3>
    <p>저장된 클립이 삭제됩니다. 진행하시겠습니까?</p>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeOverlay('clr-overlay')">취소</button>
      <button class="btn-save" onclick="closeOverlay('clr-overlay');toast('저장소 초기화 명령 전송 (Phase D-2 예정)')">확인</button>
    </div>
  </div>
</div>

<!-- 메인 레이아웃 -->
<div id="layout">
  <!-- 좌: 라이브뷰 -->
  <div id="col-live">
    <div id="live-header">
      <button id="btn-back" onclick="goBack()">← 목록으로</button>
      <span id="live-title">로딩 중...</span>
      <span id="live-status"></span>
    </div>
    <iframe id="live-frame" allowfullscreen style="display:none"></iframe>
    <div id="live-msg">
      <span style="font-size:28px;">📷</span>
      <span id="live-msg-text">라이브뷰 로딩 중...</span>
    </div>
  </div>

  <!-- 우: 5섹션 패널 -->
  <div id="col-info">
    <div id="info-header">
      <div id="info-name">로딩 중...</div>
      <div id="info-sub"></div>
    </div>
    <div id="info-scroll">
      <div id="sections">
        <div style="color:#888;text-align:center;padding:40px;">기기 정보 로딩 중...</div>
      </div>
    </div>
    <div id="bottom-btns">
      <button class="btn-onvif" onclick="onvifRefresh()">🔄 ONVIF 갱신</button>
      <button class="btn-del"   onclick="openDeleteConfirm()">🗑️ 카메라 삭제</button>
    </div>
  </div>
</div>

<script>
// TB 4.x localStorage 키
const token    = localStorage.getItem('jwt_token') ||
                 localStorage.getItem('TB-jwt_token') ||
                 localStorage.getItem('tb_ui_token');
const _params   = new URLSearchParams(location.search);
let   deviceId  = _params.get('id');   // id= 우선, 없으면 name=으로 조회
const deviceName_param = _params.get('name');

let devName = '';
let attrs   = {};   // 현재 로드된 속성 맵

// ── API 헬퍼 ──────────────────────────────────────────────────────────────────

async function apiFetch(path, opts = {}) {
  const r = await fetch(path, {
    headers: {
      'X-Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    },
    ...opts
  });
  if (!r.ok) throw new Error(`API ${r.status}: ${path}`);
  return r.status === 204 ? null : r.json();
}

async function getAttrs() {
  const arr = await apiFetch(
    `/api/plugins/telemetry/DEVICE/${deviceId}/values/attributes/SERVER_SCOPE`
  );
  const m = {};
  (arr || []).forEach(a => m[a.key] = a.value);
  return m;
}

async function saveAttrs(partial) {
  await apiFetch(`/api/plugins/telemetry/DEVICE/${deviceId}/SERVER_SCOPE`, {
    method: 'POST',
    body: JSON.stringify(partial)
  });
  // 서버에서 다시 읽어 attrs 갱신
  attrs = await getAttrs();
}

// ── 렌더링 ────────────────────────────────────────────────────────────────────

function val(key, fallback = '—') {
  const v = attrs[key];
  return (v === undefined || v === null || v === '') ? fallback : v;
}

function renderSections() {
  document.getElementById('sections').innerHTML =
    sec1() + sec2() + sec3() + sec4() + sec5();
}

/* ① 기기 식별 */
function sec1() {
  const FIELDS = [
    ['site',        '현장(Site)',   'text'],
    ['group',       '그룹',        'text'],
    ['customer',    '가입자',      'text'],
    ['model',       '모델',        'text'],
    ['cam_type',    '유형',        'select:Dome,Bullet,기타'],
    ['location',    '위치',        'text'],
    ['mac_address', 'MAC 주소',    'text'],
    ['internal_ip', '내부 IP',     'text'],
    ['connection',  '외부 연결',   'text'],
  ];
  const rows = FIELDS.map(([k, label, type]) => {
    if (type.startsWith('select:')) {
      const opts = type.split(':')[1].split(',')
        .map(o => `<option ${val(k) === o ? 'selected' : ''}>${o}</option>`).join('');
      return `<div class="attr-row">
        <span class="attr-key">${label}</span>
        <span class="attr-val" data-key="${k}">${val(k)}</span>
        <select class="edit-field" data-key="${k}" style="display:none">${opts}</select>
      </div>`;
    }
    return `<div class="attr-row">
      <span class="attr-key">${label}</span>
      <span class="attr-val" data-key="${k}">${val(k)}</span>
      <input class="edit-field" data-key="${k}" value="${val(k)}" style="display:none">
    </div>`;
  });
  const ts = val('activated_at');
  rows.push(`<div class="attr-row"><span class="attr-key">최초 등록일</span><span class="attr-val">${ts}</span></div>`);

  return `<div class="section">
    <div class="sec-head">
      <span class="sec-head-text">① 기기 식별</span>
      <button class="btn-edit" id="s1-btn-edit" onclick="editMode(1)">✏️ 편집</button>
      <button class="btn-save"   id="s1-btn-save"   onclick="saveSection(1)" style="display:none">저장</button>
      <button class="btn-cancel" id="s1-btn-cancel" onclick="cancelEdit(1)"  style="display:none">취소</button>
    </div>
    <div class="attr-table" id="s1-body">${rows.join('')}</div>
  </div>`;
}

/* ② 시스템 정보 */
function sec2() {
  const fv = val('firmware_version', '');
  const fd = val('firmware_date', '');
  const fvDisp = fv || '<span class="muted">TBD</span>';
  const fdDisp = fd || '<span class="muted">TBD</span>';
  return `<div class="section">
    <div class="sec-head"><span class="sec-head-text">② 시스템 정보</span></div>
    <div class="attr-table">
      <div class="attr-row"><span class="attr-key">펌웨어 버전</span><span class="attr-val">${fvDisp}</span></div>
      <div class="attr-row"><span class="attr-key">펌웨어 날짜</span><span class="attr-val">${fdDisp}</span></div>
    </div>
  </div>`;
}

/* ③ 에지 저장소 */
function sec3() {
  function barHtml(label, used, total) {
    if (!total) return `<div class="progress-row">
      <div class="progress-label"><span>${label}</span><span style="color:#888">— GB</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
    </div>`;
    const pct = Math.round((used / total) * 100);
    const cls = pct >= 90 ? 'full' : pct >= 70 ? 'warn' : '';
    const col = pct >= 90 ? '#f44336' : pct >= 70 ? '#ffb300' : '#4caf50';
    const badge = pct >= 90 ? '가득참' : pct >= 70 ? '경고' : '정상';
    return `<div class="progress-row">
      <div class="progress-label">
        <span>${label}</span>
        <span>${used} / ${total} GB &nbsp;<span style="color:${col}">● ${badge}</span></span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  }
  const sdUsed  = attrs.sd_used_gb   || 0;
  const sdTotal = attrs.sd_total_gb  || 0;
  const edUsed  = attrs.edge_used_gb || 0;
  const edTotal = attrs.edge_total_gb|| 0;

  return `<div class="section">
    <div class="sec-head"><span class="sec-head-text">③ 에지 저장소</span></div>
    <div class="attr-table">
      ${barHtml('카메라 SD', sdUsed, sdTotal)}
      ${barHtml('에지 PC',   edUsed, edTotal)}
      <div style="margin-top:8px;">
        <button class="btn-cancel" onclick="openOverlay('clr-overlay')" style="font-size:11px;">
          🗑️ 에지 저장소 정리
        </button>
      </div>
    </div>
  </div>`;
}

/* ④ 스트림 URL */
function sec4() {
  const urls = [
    ['rtsp_url_main', '메인 RTSP'],
    ['rtsp_url_sub',  '서브 RTSP'],
    ['stream_url',    '라이브뷰'],
  ];
  const rows = urls.map(([k, label]) => {
    const v = val(k, '—');
    return `<div class="copy-row">
      <span class="copy-key">${label}</span>
      <span class="copy-val">${v}</span>
      <button class="btn-copy" onclick="copyText('${v}', this)">복사</button>
    </div>`;
  });
  return `<div class="section">
    <div class="sec-head"><span class="sec-head-text">④ 스트림 URL</span></div>
    <div class="attr-table">${rows.join('')}</div>
  </div>`;
}

/* ⑤ Frigate 감지 설정 */
function sec5() {
  const FIELDS = [
    ['frigate_detect_fps',   '감지 fps',       'number', '1', '30'],
    ['frigate_min_score',    '신뢰도 임계값',  'number', '0', '1',  '0.01'],
    ['frigate_min_area',     '최소 객체 면적', 'number', '100', '50000'],
    ['frigate_record_pre',   '녹화 전 (초)',   'number', '0', '30'],
    ['frigate_record_post',  '녹화 후 (초)',   'number', '0', '60'],
    ['frigate_record_days',  '보관 기간 (일)', 'number', '1', '90'],
  ];
  const isOn  = attrs.frigate_enabled !== false;
  const notOn = attrs.frigate_notify  !== false;

  const rows = [
    `<div class="attr-row">
      <span class="attr-key">감지 활성화</span>
      <span class="attr-val ${isOn ? 'green' : 'grey'}" data-key="frigate_enabled">${isOn ? 'ON ●' : 'OFF ○'}</span>
      <select class="edit-field" data-key="frigate_enabled" data-bool style="display:none">
        <option value="true"  ${isOn ? 'selected' : ''}>ON</option>
        <option value="false" ${!isOn ? 'selected' : ''}>OFF</option>
      </select>
    </div>`,
    ...FIELDS.map(([k, label, type, min, max, step]) => {
      const v = val(k, '—');
      const stepAttr = step ? `step="${step}"` : '';
      return `<div class="attr-row">
        <span class="attr-key">${label}</span>
        <span class="attr-val" data-key="${k}">${v}</span>
        <input class="edit-field" type="${type}" data-key="${k}" value="${v}"
               min="${min}" max="${max}" ${stepAttr} style="display:none">
      </div>`;
    }),
    `<div class="attr-row">
      <span class="attr-key">알림</span>
      <span class="attr-val ${notOn ? 'green' : 'grey'}" data-key="frigate_notify">${notOn ? 'ON ●' : 'OFF ○'}</span>
      <select class="edit-field" data-key="frigate_notify" data-bool style="display:none">
        <option value="true"  ${notOn ? 'selected' : ''}>ON</option>
        <option value="false" ${!notOn ? 'selected' : ''}>OFF</option>
      </select>
    </div>`,
  ];

  return `<div class="section">
    <div class="sec-head">
      <span class="sec-head-text">⑤ Frigate 감지 설정</span>
      <button class="btn-edit" id="s5-btn-edit" onclick="editMode(5)">✏️ 편집</button>
      <button class="btn-save"   id="s5-btn-save"   onclick="saveSection(5)" style="display:none">저장</button>
      <button class="btn-cancel" id="s5-btn-cancel" onclick="cancelEdit(5)"  style="display:none">취소</button>
    </div>
    <div class="attr-table" id="s5-body">${rows.join('')}</div>
  </div>`;
}

// ── 편집 모드 ──────────────────────────────────────────────────────────────────

function editMode(sec) {
  const body = document.getElementById(`s${sec}-body`);
  body.querySelectorAll('.attr-val[data-key]').forEach(el => el.style.display = 'none');
  body.querySelectorAll('.edit-field').forEach(el => el.style.display = 'block');
  showButtons(sec, false);
}

function cancelEdit(sec) {
  const body = document.getElementById(`s${sec}-body`);
  body.querySelectorAll('.attr-val[data-key]').forEach(el => el.style.display = '');
  body.querySelectorAll('.edit-field').forEach(el => el.style.display = 'none');
  showButtons(sec, true);
}

function showButtons(sec, editVisible) {
  document.getElementById(`s${sec}-btn-edit`).style.display   = editVisible ? '' : 'none';
  document.getElementById(`s${sec}-btn-save`).style.display   = editVisible ? 'none' : '';
  document.getElementById(`s${sec}-btn-cancel`).style.display = editVisible ? 'none' : '';
}

async function saveSection(sec) {
  const body   = document.getElementById(`s${sec}-body`);
  const partial = {};

  body.querySelectorAll('.edit-field').forEach(el => {
    const k = el.dataset.key;
    let v   = el.value;
    if ('bool' in el.dataset) v = (v === 'true');
    else if (el.type === 'number') v = parseFloat(v);
    partial[k] = v;
  });

  try {
    const saveBtn = document.getElementById(`s${sec}-btn-save`);
    saveBtn.textContent = '저장 중...';
    saveBtn.disabled = true;
    await saveAttrs(partial);
    renderSections();
    toast('저장 완료');
  } catch (e) {
    toast('저장 실패: ' + e.message, true);
    cancelEdit(sec);
  }
}

// ── 유틸 ──────────────────────────────────────────────────────────────────────

function copyText(text, btn) {
  if (text === '—') return;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
  });
}

function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? '#3a1a1a' : '#1a3a2a';
  el.style.borderColor = isErr ? '#5a2a2a' : '#2a5a3a';
  el.style.color       = isErr ? '#f44336' : '#4caf50';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

function goBack() {
  if (history.length > 1) history.back();
  else window.location.href = '/camera-list.html';
}

function openDeleteConfirm() {
  document.getElementById('del-msg').textContent =
    `'${devName}'을 목록에서 제거하시겠습니까?\nTB 기기 정보가 삭제됩니다.`;
  document.getElementById('btn-del-confirm').onclick = doDelete;
  openOverlay('del-overlay');
}

async function doDelete() {
  closeOverlay('del-overlay');
  try {
    await apiFetch(`/api/device/${deviceId}`, { method: 'DELETE' });
    toast('삭제 완료');
    setTimeout(() => { window.location.href = '/camera-list.html'; }, 1200);
  } catch (e) {
    toast('삭제 실패: ' + e.message, true);
  }
}

async function onvifRefresh() {
  if (!deviceId) return;
  const btn = document.querySelector('.btn-onvif');
  if (btn) { btn.textContent = '⏳ 갱신 중...'; btn.disabled = true; }

  try {
    /* TB one-way RPC → 에지 PC의 edge_onvif_handler.py --daemon 이 수신 */
    await apiFetch(`/api/plugins/rpc/oneway/${deviceId}`, {
      method: 'POST',
      body: JSON.stringify({ method: 'getOnvifInfo', params: {}, timeout: 30000 })
    });
    toast('요청 전송 — 에지 응답 대기 중 (최대 30초)...');

    /* 속성 갱신 폴링 (최대 30초, 2초 간격) */
    const prevFw = attrs.firmware_version || '';
    for (let i = 0; i < 15; i++) {
      await new Promise(r => setTimeout(r, 2000));
      try {
        const arr = await apiFetch(
          `/api/plugins/telemetry/DEVICE/${deviceId}/values/attributes/SERVER_SCOPE`
        );
        const fresh = {};
        arr.forEach(x => { fresh[x.key] = x.value; });
        if (fresh.firmware_version && fresh.firmware_version !== prevFw) {
          attrs.firmware_version = fresh.firmware_version;
          attrs.firmware_date    = fresh.firmware_date || '';
          renderSections();
          toast(`✅ 펌웨어: ${attrs.firmware_version}`);
          return;
        }
      } catch (_) {}
    }
    toast('에지 미응답 — 에지 PC에서 edge_onvif_handler.py --daemon 실행 필요', true);
  } catch (e) {
    toast('RPC 오류: ' + e.message, true);
  } finally {
    if (btn) { btn.textContent = '🔄 ONVIF 갱신'; btn.disabled = false; }
  }
}

// ── 초기 로드 ─────────────────────────────────────────────────────────────────

async function loadDevice() {
  if (!token) {
    document.getElementById('sections').innerHTML =
      '<p style="color:#f44;padding:20px;text-align:center">⚠️ TB 로그인 후 이용하세요</p>';
    return;
  }
  // id= 없으면 name= 으로 기기 조회 (textSearch 후 정확한 이름 매칭)
  if (!deviceId && deviceName_param) {
    try {
      const list = await apiFetch(
        `/api/tenant/devices?pageSize=20&page=0&textSearch=${encodeURIComponent(deviceName_param)}`
      );
      const exact = (list.data || []).find(d => d.name === deviceName_param);
      if (!exact) throw new Error('not found');
      deviceId = exact.id.id;
    } catch (e) {
      document.getElementById('sections').innerHTML =
        `<p style="color:#f44;padding:20px;text-align:center">⚠️ 기기를 찾을 수 없습니다: ${deviceName_param}</p>`;
      return;
    }
  }
  if (!deviceId) {
    document.getElementById('sections').innerHTML =
      '<p style="color:#f44;padding:20px;text-align:center">⚠️ id= 또는 name= 파라미터가 필요합니다</p>';
    return;
  }
  try {
    // 기기 기본 정보
    const dev = await apiFetch(`/api/device/${deviceId}`);
    devName = dev.name || deviceId;

    // 속성 로드
    attrs = await getAttrs();

    // 헤더 업데이트
    document.getElementById('live-title').textContent = devName;
    document.getElementById('live-status').innerHTML  =
      '<span style="color:#4caf50;font-size:11px">● 정상</span>';
    document.getElementById('info-name').textContent  = devName;
    document.getElementById('info-sub').textContent   =
      `${attrs.site || ''} · ${attrs.group || ''} · ${attrs.customer || ''}`;

    // 라이브뷰
    const streamUrl = attrs.stream_url;
    if (streamUrl) {
      const frame = document.getElementById('live-frame');
      frame.src = streamUrl;
      frame.style.display = 'block';
      document.getElementById('live-msg').style.display = 'none';
    } else {
      document.getElementById('live-msg').style.display = 'flex';
      document.getElementById('live-msg-text').textContent = '스트림 URL 없음';
    }

    // 5섹션 렌더
    renderSections();

  } catch (e) {
    document.getElementById('sections').innerHTML =
      `<p style="color:#f44;padding:20px;text-align:center">⚠️ 로드 실패: ${e.message}</p>`;
    document.getElementById('live-msg').style.display = 'flex';
    document.getElementById('live-msg-text').textContent = '로드 실패';
  }
}

loadDevice();
</script>
